<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bubbles — Progress</title>
<meta property="og:title" content="Bubbles — Progress">
<meta property="og:description" content="Vision-alignment progress tracker for the Bubbles project. Each section mirrors a layer of the project's vision document.">
<style>
  :root {
    --bg: #0a1020;
    --bg-grad-2: #0e1530;
    --card: #131c2f;
    --card-elevated: #182241;
    --card-hover: #1c2849;
    --border: #2a385a;
    --border-bright: #3d4f7a;
    --text: #ecf1f8;
    --text-mid: #b1bfdb;
    --text-dim: #7e8eb0;
    --accent: #5eb8ff;
    --accent-bright: #7dd3fc;
    --done: #4ade80;
    --warn: #fbbf24;
    --bar-bg: #0a0f1f;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.18);
    --shadow-md: 0 4px 14px rgba(0,0,0,0.28);
    --shadow-lg: 0 10px 28px rgba(0,0,0,0.36);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background:
      radial-gradient(1200px 700px at 20% -10%, rgba(94,184,255,0.07), transparent 60%),
      radial-gradient(900px 600px at 100% 10%, rgba(125,211,252,0.05), transparent 60%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-grad-2) 100%);
    background-attachment: fixed;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
  }
  .container { max-width: 880px; margin: 0 auto; padding: 40px 22px 96px; }

  /* === Header ============================================================ */
  header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 6px;
  }
  .brand-dot {
    width: 32px; height: 32px; border-radius: 999px;
    background: radial-gradient(circle at 30% 30%, var(--accent-bright), var(--accent) 60%, #2a6ea8 100%);
    box-shadow: 0 0 18px rgba(94,184,255,0.45), inset -4px -6px 10px rgba(0,0,0,0.15);
  }
  h1 {
    font-size: 26px; font-weight: 650; margin: 0;
    letter-spacing: -0.015em;
    background: linear-gradient(180deg, var(--text) 0%, var(--text-mid) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .subtitle {
    color: var(--text-dim); font-size: 13px;
    margin: 6px 0 28px;
  }

  /* === Overall card ====================================================== */
  .overall-card {
    background: linear-gradient(180deg, var(--card-elevated) 0%, var(--card) 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 26px;
    margin-bottom: 18px;
    box-shadow: var(--shadow-md);
  }
  .overall-label {
    font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.09em;
    margin-bottom: 12px; font-weight: 600;
  }
  .overall-row {
    display: flex; align-items: baseline; gap: 14px; margin-bottom: 16px;
  }
  .overall-percent {
    font-size: 40px; font-weight: 650;
    color: var(--accent-bright);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.025em;
    line-height: 1;
  }
  .overall-name { font-size: 14px; color: var(--text-mid); }

  /* === Progress bars ===================================================== */
  .bar-track {
    background: var(--bar-bg);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
    height: 8px;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
  }
  .bar-fill {
    background: linear-gradient(90deg, var(--accent), var(--accent-bright));
    height: 100%;
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(.2,.7,.2,1);
    box-shadow: 0 0 8px rgba(94,184,255,0.45);
  }
  .bar-fill.done {
    background: linear-gradient(90deg, var(--done), #86efac);
    box-shadow: 0 0 8px rgba(74,222,128,0.4);
  }
  .bar-fill.empty { background: var(--border); box-shadow: none; }
  .overall-card .bar-track { height: 12px; }

  /* === Expand hint ======================================================== */
  .expand-hint {
    font-size: 12px;
    color: var(--text-dim);
    margin: 0 4px 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .expand-hint .key {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--text-mid);
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
  }

  /* === Modules =========================================================== */
  .module {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s, background 0.18s;
    box-shadow: var(--shadow-sm);
  }
  .module:hover {
    border-color: var(--border-bright);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
    background: var(--card-hover);
  }
  .module.open {
    border-color: var(--border-bright);
    box-shadow: var(--shadow-md);
  }
  .module-header {
    padding: 16px 18px;
    cursor: pointer;
    user-select: none;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 14px;
    align-items: center;
  }
  .module-name-row {
    display: flex; align-items: center; gap: 10px; min-width: 0;
  }
  .module-name {
    font-weight: 550; font-size: 15px; color: var(--text);
    letter-spacing: -0.005em;
  }
  .module-meta { display: flex; align-items: center; gap: 14px; }
  .module-percent {
    color: var(--text);
    font-variant-numeric: tabular-nums;
    font-size: 14px; font-weight: 600;
    letter-spacing: -0.01em;
  }
  .module-bar { grid-column: 1 / -1; margin-top: 6px; }
  .module-bar .bar-track { height: 6px; }

  /* Chevron — visible expand affordance */
  .chevron {
    color: var(--accent);
    font-size: 18px;
    line-height: 1;
    width: 26px; height: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 8px;
    background: rgba(94,184,255,0.10);
    border: 1px solid rgba(94,184,255,0.18);
    transition: transform 0.22s cubic-bezier(.2,.7,.2,1), background 0.18s;
    flex-shrink: 0;
  }
  .module:hover .chevron { background: rgba(94,184,255,0.20); }
  .module.open .chevron {
    transform: rotate(180deg);
    background: rgba(94,184,255,0.25);
  }

  .warn-dot {
    width: 8px; height: 8px;
    border-radius: 999px;
    background: var(--warn);
    box-shadow: 0 0 6px rgba(251,191,36,0.6);
    flex-shrink: 0;
  }
  .done-dot {
    width: 8px; height: 8px;
    border-radius: 999px;
    background: var(--done);
    box-shadow: 0 0 6px rgba(74,222,128,0.55);
    flex-shrink: 0;
  }

  /* === Module body ======================================================= */
  .module-body {
    display: none;
    padding: 18px 20px 22px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.12);
  }
  .module.open .module-body { display: block; }

  .section-label {
    font-size: 10.5px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.09em;
    margin: 0 0 12px;
    font-weight: 600;
  }
  .section-label + .section-label { margin-top: 18px; }

  /* === Submodule rows (with progress bar each) =========================== */
  .sub {
    padding: 10px 0 12px;
    border-bottom: 1px solid var(--border);
  }
  .sub:last-of-type { border-bottom: none; }
  .sub-top {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .sub-name {
    color: var(--text-mid);
    font-size: 13.5px;
    line-height: 1.45;
  }
  .sub-percent {
    color: var(--text);
    font-variant-numeric: tabular-nums;
    text-align: right;
    font-size: 12.5px; font-weight: 600;
    letter-spacing: -0.01em;
    min-width: 38px;
  }
  .sub-status {
    text-align: right;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    min-width: 56px;
  }
  .status-done { color: var(--done); }
  .status-partial { color: var(--accent-bright); }
  .status-todo { color: var(--text-dim); }

  .sub-bar { padding: 0 0; }
  .sub-bar .bar-track { height: 4px; }

  /* === Issues ============================================================ */
  .issues-list { margin: 0; padding: 0; list-style: none; }
  .issue {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0;
    font-size: 13px; color: var(--text-mid);
    line-height: 1.5;
    border-bottom: 1px solid var(--border);
  }
  .issue:last-of-type { border-bottom: none; }
  .issue-icon {
    color: var(--warn);
    flex-shrink: 0;
    font-size: 13px;
    line-height: 1.5;
    margin-top: 1px;
  }

  /* === Footer ============================================================ */
  footer {
    margin-top: 36px;
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
    line-height: 1.7;
  }
  footer a {
    color: var(--text-mid);
    text-decoration: none;
    border-bottom: 1px dotted var(--border-bright);
  }
  footer a:hover { color: var(--accent-bright); border-color: var(--accent-bright); }

  /* Small screens */
  @media (max-width: 540px) {
    .container { padding: 28px 16px 80px; }
    h1 { font-size: 22px; }
    .overall-percent { font-size: 32px; }
    .module-name { font-size: 14px; }
    .sub-status { display: none; }
    .sub-top { grid-template-columns: 1fr auto; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand-dot" aria-hidden="true"></div>
      <h1>Bubbles — Progress</h1>
    </header>
    <div class="subtitle" id="subtitle"></div>

    <div class="overall-card">

    <div class="expand-hint">

      <span>any section below to expand its sub-items, progress, and open issues</span>
    </div>

    <div id="modules"></div>

    <footer id="footer"></footer>
  </div>

  <script>
    /* =====================================================================
       DATA — edit this block to update the tracker. Each section maps

       minimum is the ship bar.

    const DATA = {

          ],

            { name: "Self-awareness — operational state (in-flight ops + pressure)", percent: 100 },
            { name: "Identity persistence (state protection + append-only)", percent: 100 },
            { name: "Auditability (audit log + hash chain + cross-AI source anchors)", percent: 100 },
            { name: "Single voice (persona prepend across all dispatches)", percent: 100 },
            { name: "Care as disposition (Article VI in code)", percent: 100 },
            { name: "Time-horizon discipline (substrate-swappability test)", percent: 100 },
          ],
          issues: [],
        },
        {
          name: "Vision §II — Five verbs (engagement modes)",
          percent: 45,
          submodules: [
            { name: "Serve — chat + coding delegation + self-modification dispatch", percent: 70 },
            { name: "Serve — IoT / robot / external-network actuation", percent: 0 },
            { name: "Anticipate — reasoning over self-description", percent: 60 },
            { name: "Anticipate — Bubbles' own resource/security needs surface (pressure preamble, refusal hint)", percent: 75 },
            { name: "Anticipate — autonomous threat scrubbing of Leader data", percent: 0 },
            { name: "Guide — surfaces concerns (Article VI 'once')", percent: 80 },
            { name: "Safeguard — kernel state protection (Hard Rules 9–12)", percent: 100 },
            { name: "Safeguard — Leader-facing threat protection (financial, social, etc.)", percent: 0 },
            { name: "Represent — basic delegation via Claude Code substrate", percent: 30 },
            { name: "Represent — per-domain authorization framework", percent: 0 },
          ],
          issues: [

          ],

            { name: "Federation mint + multi-bubble coordination", percent: 0 },

          issues: [

          ],
        },
        {
          name: "Vision §IV — Growth & continuity readiness",
          percent: 50,
          submodules: [
            { name: "Substrate-swappability (chat-model config + persona-agnostic test)", percent: 100 },
            { name: "Self-modification governance (Hard Rules 9–12 + audit)", percent: 100 },
            { name: "Resource budgeting (op-scheduler admission + critical-pressure refusal)", percent: 100 },
            { name: "Local-first architecture (kernel + chat run offline)", percent: 90 },
            { name: "Machine-agnostic platform (Win / Linux / Mac / ARM / future)", percent: 30 },
            { name: "Cloud-augmented architecture (when authorized)", percent: 10 },
            { name: "Principal-authorized resource acquisition path", percent: 30 },
            { name: "Federation as resource-pool propagation (multi-device pool)", percent: 0 },
            { name: "Backup / failsafe (cross-device, cloud)", percent: 0 },
          ],
          issues: [
            "Machine-agnostic platform: Windows works; Linux/Mac unproven; OS-specific quirks still surface. Vision adds this as a hard requirement; deferrable but architecturally tracked.",
            "Cloud architecture not built — V1 is local-only by design, but vision is local-first cloud-augmented; no surface yet for cloud-augmented ops.",
            "Resource acquisition: Bubbles can surface needs (pressure preamble, refusal hint, system-state + scheduler endpoints) but can't request/acquire — no path between 'need surfaced' and 'principal provisions' yet.",
            "Federation as resource-pool propagation: zero today. Vision frames this as Bubbles spreading to any authorized hardware (the 'virus, in the propagation sense' framing) — each new device pools its compute/storage/sensors into shared resources.",
            "Backup / failsafe: zero coverage. Single-machine state today.",
          ],
        },
        {
          name: "Vision §V — Operating disciplines",
          percent: 80,
          submodules: [
            { name: "Graceful degradation (refuse loudly, no silent fallback)", percent: 100 },
            { name: "Refuse-with-reason (structured failure surface in chat + audit)", percent: 100 },
            { name: "Append-only state (audit, succession, conversation log)", percent: 100 },
            { name: "Cat 3 always principal-authorized", percent: 100 },
            { name: "Cross-AI auditor anchors in source comments", percent: 90 },
            { name: "Tests pin invariants (1146 tests, zero failures)", percent: 100 },
            { name: "UI excellence across every surface (slick + smooth, all platforms)", percent: 40 },
            { name: "UI right-rail surfacing system-state + scheduler (visible self-awareness)", percent: 0 },
            { name: "Plugin shim install runbook", percent: 0 },
            { name: "Internal vision tracker (kernel sub-program — pullable on demand; surfacing-influence deferred)", percent: 50 },
          ],
          issues: [
            "UI excellence: PC Electron shell is functional but not yet polished (basic styling, no animations, no skeleton states, no perception-threshold loading); mobile + companion surfaces at 0%. Below the bar set by the vision — needs a dedicated polish slice on PC + design system before mobile builds.",
            "Plugin shim install runbook: fresh installs need a shim placed at a documented path; the runbook isn't written yet.",
            "Long-standing auto-launch defect for the L3 watcher — process not coming up reliably on daemon start; not investigated yet.",
          ],
        },
        {
          name: "Vision §VII — Long-term horizons (scaffolding only at V1)",
          percent: 10,
          submodules: [
            { name: "OS-level Bubbles (file system, comms, transactions)", percent: 0 },
            { name: "Embodied presence (robots, IoT, vehicle, wearables)", percent: 0 },
            { name: "Multi-generational lineage (Article III, V, VIII anchored)", percent: 30 },
            { name: "Adversarial-AI threat model (privacy-by-construction)", percent: 15 },
            { name: "Commercial Bubbles SaaS subset (derivative product — templated from this codebase at build time; licensed un-abliterated models, server-held state)", percent: 0 },
            { name: "Machine-agnostic platform validation (Linux + Mac builds + boot tests; ARM/embedded later — §IV is the property, this submodule tracks the validation work)", percent: 0 },
          ],
          issues: [],
        },
      ],
    };
    /* ===== /DATA ===== */

    function el(tag, attrs, children) {
      const node = document.createElement(tag);
      if (attrs) {
        for (const k of Object.keys(attrs)) {
          const v = attrs[k];
          if (v == null) continue;
          if (k === "class") node.className = v;
          else if (k === "html") node.innerHTML = v;
          else node.setAttribute(k, v);
        }
      }
      const list = children == null ? [] : (Array.isArray(children) ? children : [children]);
      for (const child of list) {
        if (child == null) continue;
        node.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
      }
      return node;
    }

    function pct(n) { return n + "%"; }

    function statusFor(p) {
      if (p >= 100) return { cls: "status-done", text: "done" };
      if (p <= 0) return { cls: "status-todo", text: "todo" };
      return { cls: "status-partial", text: "partial" };
    }

    function fillClassFor(p) {
      if (p >= 100) return "bar-fill done";
      if (p <= 0) return "bar-fill empty";
      return "bar-fill";
    }

    function progressBar(percent, fillClass) {
      return el("div", { class: "bar-track" }, [
        el("div", {
          class: fillClass || fillClassFor(percent),
          style: "width: " + Math.max(0, Math.min(100, percent)) + "%",
        }),
      ]);
    }

    function renderHeader() {
      document.getElementById("overall-percent").textContent = pct(DATA.overall_percent);
      document.getElementById("overall-bar").style.width = pct(DATA.overall_percent);
      const fillEl = document.getElementById("overall-bar");
      fillEl.className = fillClassFor(DATA.overall_percent);
      const subtitle = document.getElementById("subtitle");
      subtitle.textContent = "Snapshot: " + DATA.source;
      document.getElementById("footer").innerHTML =
        "Last updated " + DATA.generated_at +
        " &middot; " +
        "<a href=\"https://github.com/gouthamreddym22-collab/Bubbles-progress\" target=\"_blank\" rel=\"noopener\">view source on GitHub</a>";
    }

    function renderModule(m, opts) {
      const openByDefault = !!(opts && opts.openByDefault);
      const hasIssues = m.issues && m.issues.length > 0;
      const iconEl = hasIssues
        ? el("span", { class: "warn-dot", title: m.issues.length + " open issue(s)" })
        : (m.percent >= 100 ? el("span", { class: "done-dot", title: "complete" }) : null);

      const nameRow = el("div", { class: "module-name-row" }, [
        iconEl,
        el("span", { class: "module-name" }, m.name),
      ]);
      const meta = el("div", { class: "module-meta" }, [
        el("span", { class: "module-percent" }, pct(m.percent)),
        el("span", { class: "chevron", title: "expand / collapse" }, "▾"),
      ]);
      const bar = el("div", { class: "module-bar" }, [
        progressBar(m.percent),
      ]);
      const header = el("div", {
        class: "module-header",
        role: "button",
        tabindex: "0",
        "aria-expanded": openByDefault ? "true" : "false",
      }, [nameRow, meta, bar]);

      const bodyChildren = [];
      if (m.submodules && m.submodules.length) {
        bodyChildren.push(el("div", { class: "section-label" }, "Sub-items"));
        for (const s of m.submodules) {
          const st = statusFor(s.percent);
          const subTop = el("div", { class: "sub-top" }, [
            el("span", { class: "sub-name" }, s.name),
            el("span", { class: "sub-percent" }, pct(s.percent)),
            el("span", { class: "sub-status " + st.cls }, st.text),
          ]);
          const subBar = el("div", { class: "sub-bar" }, [progressBar(s.percent)]);
          bodyChildren.push(el("div", { class: "sub" }, [subTop, subBar]));
        }
      }
      if (hasIssues) {
        bodyChildren.push(el("div", { class: "section-label" }, "Open issues / followups"));
        const ul = el("ul", { class: "issues-list" });
        for (const issue of m.issues) {
          ul.appendChild(el("li", { class: "issue" }, [
            el("span", { class: "issue-icon" }, "⚠"),
            el("span", { html: issue }),
          ]));
        }
        bodyChildren.push(ul);
      }
      const body = el("div", { class: "module-body" }, bodyChildren);

      const root = el("div", { class: "module" + (openByDefault ? " open" : "") }, [header, body]);

      function toggle() {
        const willOpen = !root.classList.contains("open");
        root.classList.toggle("open");
        header.setAttribute("aria-expanded", willOpen ? "true" : "false");
      }
      header.addEventListener("click", toggle);
      header.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          toggle();
        }
      });
      return root;
    }

    function renderModules() {
      const host = document.getElementById("modules");
      DATA.modules.forEach(function (m, idx) {
        // Open the first module (V1 ship bar) by default — gives
        // visitors an immediate example of the expand affordance.
        host.appendChild(renderModule(m, { openByDefault: idx === 0 }));
      });
    }

    renderHeader();
    renderModules();
  </script>
</body>
</html>
