<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bubbles V1 — Progress</title>
<style>
  :root {
    --bg: #0b1220;
    --card: #131c2e;
    --card-hover: #1a2540;
    --border: #243149;
    --text: #e6ecf5;
    --text-dim: #8b9bb5;
    --accent: #38bdf8;
    --done: #34d399;
    --warn: #fbbf24;
    --bar-bg: #0a0f1c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 880px; margin: 0 auto; padding: 36px 24px 80px; }

  header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
  h1 { font-size: 22px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  .bubble-emoji { font-size: 22px; }
  .subtitle { color: var(--text-dim); font-size: 12px; margin-bottom: 28px; }

  .overall-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px 24px; margin-bottom: 24px;
  }
  .overall-label {
    font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .overall-row { display: flex; align-items: baseline; gap: 14px; margin-bottom: 14px; }
  .overall-percent {
    font-size: 34px; font-weight: 600;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .overall-name { font-size: 15px; color: var(--text-dim); }

  .bar-track {
    background: var(--bar-bg);
    border-radius: 999px;
    height: 10px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    background: linear-gradient(90deg, #38bdf8, #22d3ee);
    height: 100%;
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .overall-card .bar-track { height: 12px; }

  .module {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 10px;
    overflow: hidden; transition: background 0.15s;
  }
  .module-header {
    padding: 14px 18px; cursor: pointer; user-select: none;
    display: grid; grid-template-columns: 1fr auto; gap: 14px;
    align-items: center;
  }
  .module:hover .module-header { background: var(--card-hover); }
  .module-name-row { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .module-name { font-weight: 500; font-size: 14.5px; }
  .module-meta { display: flex; align-items: center; gap: 12px; }
  .module-percent {
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    font-size: 13px;
  }
  .module-bar { grid-column: 1 / -1; margin-top: 4px; }
  .module-bar .bar-track { height: 5px; }

  .warn-icon {
    color: var(--warn);
    font-size: 14px;
    line-height: 1;
  }
  .done-icon {
    color: var(--done);
    font-size: 13px;
    line-height: 1;
  }
  .chevron {
    color: var(--text-dim);
    font-size: 12px;
    transition: transform 0.15s;
    display: inline-block;
  }
  .module.open .chevron { transform: rotate(90deg); }

  .module-body {
    display: none;
    padding: 14px 18px 18px;
    border-top: 1px solid var(--border);
  }
  .module.open .module-body { display: block; }

  .section-label {
    font-size: 10.5px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin: 4px 0 8px;
  }
  .sub {
    display: grid; grid-template-columns: 1fr 56px 70px;
    gap: 12px; align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .sub:last-of-type { border-bottom: none; }
  .sub-name { color: var(--text); }
  .sub-percent {
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    text-align: right;
    font-size: 12px;
  }
  .sub-status { text-align: right; font-size: 12px; }
  .status-done { color: var(--done); }
  .status-partial { color: var(--accent); }
  .status-todo { color: var(--text-dim); }

  .issues-list { margin: 0; padding: 0; list-style: none; }
  .issue {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 6px 0;
    font-size: 13px; color: var(--text);
    line-height: 1.5;
  }
  .issue-icon {
    color: var(--warn);
    flex-shrink: 0;
    font-size: 12px;
    line-height: 1.5;
    margin-top: 2px;
  }

  .roadmap {
    margin-top: 28px; padding: 18px 22px;
    background: var(--card); border: 1px dashed var(--border);
    border-radius: 12px;
  }
  .roadmap-title {
    font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .roadmap-item {
    font-size: 13px; padding: 5px 0;
    color: var(--text);
  }

  footer {
    margin-top: 28px;
    color: var(--text-dim);
    font-size: 11.5px;
    text-align: center;
  }
  footer .source-path { font-family: ui-monospace, Consolas, monospace; }
</style>

    function el(tag, attrs, children) {
      const node = document.createElement(tag);
      if (attrs) {
        for (const k of Object.keys(attrs)) {
          const v = attrs[k];
          if (v == null) continue;
          if (k === "class") node.className = v;
          else if (k === "html") node.innerHTML = v;
          else node.setAttribute(k, v);
        }
      }
      const list = children == null ? [] : (Array.isArray(children) ? children : [children]);
      for (const child of list) {
        if (child == null) continue;
        node.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
      }
      return node;
    }

    function pct(n) { return n + "%"; }

    function statusFor(p) {
      if (p === 100) return { cls: "status-done", text: "done" };
      if (p === 0) return { cls: "status-todo", text: "todo" };
      return { cls: "status-partial", text: "partial" };
    }

    function renderHeader() {
      document.getElementById("overall-percent").textContent = pct(DATA.overall_percent);
      document.getElementById("overall-bar").style.width = pct(DATA.overall_percent);
      const subtitle = document.getElementById("subtitle");
      subtitle.textContent = "Snapshot from " + DATA.source + ".";
      document.getElementById("footer").innerHTML =
        "Last updated: " + DATA.generated_at +
        " &middot; Edit <span class=\"source-path\">C:\\Users\\Gowtham\\bubbles_tracker\\tracker.html</span> to refresh.";
    }

    function renderModule(m) {
      const hasIssues = m.issues && m.issues.length > 0;
      const iconEl = hasIssues
        ? el("span", { class: "warn-icon", title: m.issues.length + " open issue(s)" }, "⚠")
        : (m.percent === 100 ? el("span", { class: "done-icon", title: "complete" }, "✓") : null);

      const nameRow = el("div", { class: "module-name-row" }, [
        iconEl,
        el("span", { class: "module-name" }, m.name),
      ]);
      const meta = el("div", { class: "module-meta" }, [
        el("span", { class: "module-percent" }, pct(m.percent)),
        el("span", { class: "chevron" }, "›"),
      ]);
      const bar = el("div", { class: "module-bar" }, [
        el("div", { class: "bar-track" }, [
          el("div", { class: "bar-fill", style: "width: " + m.percent + "%" }),
        ]),
      ]);
      const header = el("div", { class: "module-header" }, [nameRow, meta, bar]);

      const bodyChildren = [];
      if (m.submodules && m.submodules.length) {
        bodyChildren.push(el("div", { class: "section-label" }, "Sub-modules"));
        for (const s of m.submodules) {
          const st = statusFor(s.percent);
          bodyChildren.push(el("div", { class: "sub" }, [
            el("span", { class: "sub-name" }, s.name),
            el("span", { class: "sub-percent" }, pct(s.percent)),
            el("span", { class: "sub-status " + st.cls }, st.text),
          ]));
        }
      }
      if (hasIssues) {
        bodyChildren.push(el("div", { class: "section-label", style: "margin-top: 14px;" }, "Open issues / followups"));
        const ul = el("ul", { class: "issues-list" });
        for (const issue of m.issues) {
          ul.appendChild(el("li", { class: "issue" }, [
            el("span", { class: "issue-icon" }, "⚠"),
            el("span", { html: issue }),
          ]));
        }
        bodyChildren.push(ul);
      }
      const body = el("div", { class: "module-body" }, bodyChildren);

      const root = el("div", { class: "module" }, [header, body]);
      header.addEventListener("click", function () { root.classList.toggle("open"); });
      return root;
    }

    function renderModules() {
      const host = document.getElementById("modules");
      for (const m of DATA.modules) host.appendChild(renderModule(m));
    }

    function renderRoadmap() {
      if (!DATA.roadmap_asks || !DATA.roadmap_asks.length) return;
      document.getElementById("roadmap-section").style.display = "block";
      const host = document.getElementById("roadmap");
      for (const r of DATA.roadmap_asks) {
        host.appendChild(el("div", { class: "roadmap-item", html: "&bull; " + r }));
      }
    }

    renderHeader();
    renderModules();
    renderRoadmap();
